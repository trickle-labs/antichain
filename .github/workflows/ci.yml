name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check, fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo test (no default features)
        run: cargo test --no-default-features

  no_std:
    name: Build no_std (alloc only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build core (no_std)
        run: cargo build -p antichain --no-default-features

      - name: Build core (no_std + serde)
        run: cargo build -p antichain --no-default-features --features serde

      - name: Build intervals (no_std)
        run: cargo build -p antichain-intervals --no-default-features

  msrv:
    name: Minimum supported Rust version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.85 (MSRV)
        uses: dtolnay/rust-toolchain@1.85.0

      - name: cargo check (MSRV)
        run: cargo check --workspace --all-features

  semver:
    name: Semver compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: antichain

  publish:
    name: Publish to crates.io
    needs: [check, no_std, msrv]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish antichain
        run: cargo publish -p antichain --no-verify --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for antichain to be available on crates.io
        run: sleep 30

      - name: Publish antichain-intervals
        run: cargo publish -p antichain-intervals --no-verify --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
